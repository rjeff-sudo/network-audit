<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SME-Shield | Network Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <nav class="border-b border-slate-800 p-4 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                SME-SHIELD
            </h1>
            <div class="flex gap-4">
                <button onclick="fetchHistory()" class="text-sm text-slate-400 hover:text-white transition">Refresh History</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        <!-- Dashboard Header -->
        <header class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <h3 class="text-slate-400 text-sm font-medium uppercase tracking-wider">Overall Health</h3>
                <p id="avg-score" class="text-4xl font-bold mt-2 text-emerald-400">--</p>
            </div>
        </header>

        <!-- Scan History Table -->
        <section class="bg-slate-800/50 rounded-2xl border border-slate-700 overflow-hidden">
            <div class="p-6 border-b border-slate-700">
                <h2 class="text-xl font-semibold">Recent Audit History</h2>
            </div>
            <table class="w-full text-left">
                <thead class="bg-slate-900/50 text-slate-400 text-sm">
                    <tr>
                        <th class="p-4 font-medium">Target IP</th>
                        <th class="p-4 font-medium">Security Score</th>
                        <th class="p-4 font-medium">Date Conducted</th>
                        <th class="p-4 font-medium text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <!-- Data will be injected here via JS -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="assets/app.js"></script>

    <!-- Modal for Scan Details -->
<div id="details-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-slate-800 border border-slate-700 w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center">
            <h2 class="text-xl font-bold text-white">Scan Findings</h2>
            <button onclick="closeModal()" class="text-slate-400 hover:text-white">&times; Close</button>
        </div>
        <div id="modal-content" class="p-6 max-h-[70vh] overflow-y-auto space-y-4 text-sm text-slate-300">
            <!-- Details will be injected here -->
        </div>
    </div>
</div>
</body>
</html>
