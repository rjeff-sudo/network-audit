<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SME-Shield | Network Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <nav class="border-b border-slate-800 p-4 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                SME-SHIELD
            </h1>
            <div class="flex gap-4">
                <button onclick="fetchHistory()" class="text-sm text-slate-400 hover:text-white transition">Refresh History</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        
        <!-- Subnet Detection & Device Discovery Section -->
        <section class="bg-gradient-to-r from-slate-800 to-slate-700 rounded-2xl border border-slate-600 p-6">
            <h2 class="text-2xl font-bold mb-4">Network Discovery</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Local Subnet</label>
                    <div class="flex gap-2">
                        <input type="text" id="subnet-input" placeholder="Auto-detect..." class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500" readonly>
                        <button onclick="detectSubnet()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg transition">Detect</button>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Scan Target</label>
                    <input type="text" id="scan-target" placeholder="e.g., 192.168.1.0/24 or 192.168.1.1-50" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <button onclick="discoverDevices()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg transition font-medium">
                Discover Devices
            </button>

            <!-- Active Devices List -->
            <div id="devices-section" class="mt-6 hidden">
                <h3 class="text-lg font-semibold mb-3 text-emerald-400">Active Devices</h3>
                <div id="devices-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 max-h-96 overflow-y-auto">
                </div>
            </div>
        </section>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h2 class="text-3xl font-bold text-white">Dashboard</h2>
                <p class="text-slate-400">Manage and monitor network security audits</p>
            </div>
            
            <button onclick="startScan()" id="scan-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-bold transition flex items-center gap-2 shadow-lg shadow-blue-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                </svg>
                Start New Audit
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <h3 class="text-slate-400 text-sm font-medium uppercase tracking-wider">Overall Health</h3>
                <p id="avg-score" class="text-4xl font-bold mt-2 text-emerald-400">--</p>
            </div>
        </div>

        <section class="bg-slate-800/50 rounded-2xl border border-slate-700 overflow-hidden">
            <div class="p-6 border-b border-slate-700">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                    <h2 class="text-xl font-semibold">Recent Audit History</h2>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="filterHistory('all')" class="filter-btn bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm transition font-medium" data-filter="all">All Time</button>
                        <button onclick="filterHistory('week')" class="filter-btn bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm transition font-medium" data-filter="week">Last Week</button>
                        <button onclick="filterHistory('2days')" class="filter-btn bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm transition font-medium" data-filter="2days">Last 2 Days</button>
                    </div>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-900/50 text-slate-400 text-sm">
                        <tr>
                            <th class="p-4 font-medium">Target IP</th>
                            <th class="p-4 font-medium">Security Score</th>
                            <th class="p-4 font-medium">Date Conducted</th>
                            <th class="p-4 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="details-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-4xl rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-white">Scan Findings</h2>
                    <p id="scan-ip" class="text-sm text-slate-400 mt-1">--</p>
                </div>
                <button onclick="closeModal()" class="text-2xl text-slate-400 hover:text-white transition">&times;</button>
            </div>
            <div class="p-6 border-b border-slate-700 bg-slate-900/30">
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-wider">Security Score</p>
                        <p id="scan-score" class="text-3xl font-bold text-emerald-400 mt-1">--</p>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-wider">Total Vulnerabilities</p>
                        <p id="scan-cve-count" class="text-3xl font-bold text-blue-400 mt-1">--</p>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-wider">Scan Date</p>
                        <p id="scan-date" class="text-sm text-slate-300 mt-1">--</p>
                    </div>
                </div>
            </div>
            <div id="modal-content" class="p-6 max-h-[60vh] overflow-y-auto space-y-4 text-sm text-slate-300">
                </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
